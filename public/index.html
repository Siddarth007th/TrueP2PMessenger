<!DOCTYPE html><html><head><title>P2P Chat</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui;display:flex;height:100vh;background:#0b141a;color:#e9edef}
.left{width:240px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #2a2f32}
.right{flex:1;display:flex;flex-direction:column;background:#0b141a}
.hdr{padding:16px;background:#202c33;font-weight:700;font-size:15px;border-bottom:1px solid #2a2f32;display:flex;align-items:center;justify-content:space-between}
.link{color:#00a884;text-decoration:none;font-size:12px;font-weight:400}
.contacts{flex:1;padding:8px;overflow-y:auto}
.contact{display:block;width:100%;padding:12px;margin:4px 0;border:none;border-radius:8px;background:#202c33;color:#e9edef;cursor:pointer;text-align:left;font-size:14px}
.contact:hover:not(:disabled){background:#2a3942}
.contact.active{background:#005c4b}
.contact:disabled{opacity:.4;cursor:not-allowed}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
.green{background:#00a884}.red{background:#ea0038}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}
.msg{padding:8px 12px;border-radius:8px;max-width:75%;font-size:14px;line-height:1.4}
.msg.in{background:#202c33;align-self:flex-start}
.msg.out{background:#005c4b;align-self:flex-end}
.msg.sys{background:rgba(32,44,51,.8);align-self:center;font-size:12px;color:#8696a0;border-radius:12px;padding:4px 12px}
.msg b{color:#00a884;font-size:12px}
.inp{display:flex;gap:8px;padding:12px;background:#202c33}
input{flex:1;padding:10px 14px;border:none;border-radius:8px;background:#2a3942;color:#e9edef;font-size:14px;outline:none}
input:disabled{opacity:.4;cursor:not-allowed}
input::placeholder{color:#8696a0}
button{padding:10px 18px;border:none;border-radius:8px;background:#00a884;color:#fff;font-weight:600;cursor:pointer;font-size:14px}
button:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}
</style></head><body>
<div class="left">
<div class="hdr"><span id="nn">...</span><a class="link" href="/server.html" target="_blank">Server →</a></div>
<div class="contacts" id="ct"></div>
</div>
<div class="right">
<div class="hdr" id="ch">Select a peer to begin</div>
<div class="msgs" id="msgs"></div>
<div class="inp">
<input id="i" disabled placeholder="Select a peer first...">
<button id="b" disabled onclick="send()">Send</button>
</div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const s=io();let me='',ac=null,rp=new Set(),mr=false,ap=[],cm={};
s.on('init',d=>{me=d.name;document.title=`Node ${me} — Chat`;document.getElementById('nn').textContent=`Node ${me}`;ap=['A','B','C'].filter(x=>x!==me);ap.forEach(p=>cm[p]=[]);cm['GROUP']=[];rc();});
s.on('peer-ready',p=>{rp.add(p);rc();});
s.on('mesh-ready',()=>{mr=true;rc();});
s.on('sys',t=>{const el=document.getElementById('msgs');el.innerHTML+=`<div class="msg sys">${t}</div>`;el.scrollTop=el.scrollHeight;});
s.on('chat-msg',m=>{let ch;if(m.group)ch='GROUP';else if(m.from==='Me')ch=m.to;else ch=m.from;if(!cm[ch])cm[ch]=[];cm[ch].push(m);if(ac===ch)rm();});
function rc(){let h='';ap.forEach(p=>{const r=rp.has(p);h+=`<button class="contact ${ac===p?'active':''}" ${r?'':'disabled'} onclick="pick('${p}')"><span class="dot ${r?'green':'red'}"></span>Node ${p}</button>`;});if(mr)h+=`<button class="contact ${ac==='GROUP'?'active':''}" onclick="pick('GROUP')"><span class="dot green"></span>Group Chat</button>`;document.getElementById('ct').innerHTML=h;}
function pick(t){ac=t;rc();rm();document.getElementById('i').disabled=false;document.getElementById('b').disabled=false;document.getElementById('i').placeholder=t==='GROUP'?'Group message...':'Message Node '+t+'...';document.getElementById('ch').textContent=t==='GROUP'?'Group Chat':'Chat with Node '+t;document.getElementById('i').focus();}
function rm(){if(!ac)return;const arr=cm[ac]||[];let h='';arr.forEach(m=>{const out=m.from==='Me';h+=`<div class="msg ${out?'out':'in'}"><b>${m.from}${m.group?' (Group)':''}</b><br>${m.text}</div>`;});const el=document.getElementById('msgs');el.innerHTML=h;el.scrollTop=el.scrollHeight;}
function send(){const inp=document.getElementById('i'),t=inp.value.trim();if(!t||!ac)return;if(ac==='GROUP')s.emit('send-group',{text:t});else s.emit('send-dm',{to:ac,text:t});inp.value='';inp.focus();}
document.getElementById('i').addEventListener('keypress',e=>{if(e.key==='Enter')send();});
</script></body></html>
